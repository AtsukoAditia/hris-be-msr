name: Apply Pint Formatting

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feat/sprint-5-1
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none
      - run: composer install --no-interaction --prefer-dist --no-progress
      - name: Format and commit
        run: |
          vendor/bin/pint app database routes tests
          rm .github/workflows/pint-preview.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "style: format Sprint 5 backend changes"
          git push origin HEAD:feat/sprint-5-1
