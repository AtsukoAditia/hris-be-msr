name: Backend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: PHP 8.3 / Laravel
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: hris_test
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      APP_ENV: testing
      APP_DEBUG: false
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: hris_test
      DB_USERNAME: root
      DB_PASSWORD: root
      CACHE_STORE: array
      CACHE_DRIVER: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_mysql, fileinfo, xml, ctype, tokenizer
          tools: composer:v2
          coverage: none

      - name: Validate Composer files
        run: composer validate --strict

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --ansi

      - name: Prepare Laravel environment
        run: |
          cp .env.example .env
          php artisan key:generate --force
          php artisan config:clear

      - name: Run database migrations
        run: php artisan migrate --force --no-interaction

      - name: Generate Pint formatting patch
        shell: bash
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          mapfile -t PHP_FILES < <(git diff --name-only --diff-filter=ACMRT "$BASE_SHA" "${{ github.sha }}" -- '*.php')

          if [ "${#PHP_FILES[@]}" -eq 0 ]; then
            touch pint-format.patch
            exit 0
          fi

          vendor/bin/pint "${PHP_FILES[@]}"
          git diff --binary > pint-format.patch

      - name: Upload Pint formatting patch
        uses: actions/upload-artifact@v4
        with:
          name: pint-format-patch
          path: pint-format.patch
          if-no-files-found: error
          retention-days: 1

      - name: Fail when formatting changes are required
        shell: bash
        run: |
          if [ -s pint-format.patch ]; then
            echo "Pint formatting changes are required."
            exit 1
          fi

      - name: Run test suite
        run: composer test
