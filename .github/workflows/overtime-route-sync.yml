name: Overtime route sync

on:
  push:
    branches:
      - feat/overtime-frontend-support

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/overtime-frontend-support
      - name: Register public policy endpoint
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('routes/api_v1.php')
          content = path.read_text()
          import_line = "use App\\Http\\Controllers\\API\\OvertimePolicyController;\n"
          anchor = "use App\\Http\\Controllers\\API\\OvertimeController;\n"
          if import_line not in content:
              content = content.replace(anchor, anchor + import_line)

          route_line = "        Route::get('/overtime-policies', [OvertimePolicyController::class, 'index']);\n"
          route_anchor = "        Route::get('/leave-types/{leaveType}', [LeaveTypeController::class, 'show']);\n"
          if route_line not in content:
              content = content.replace(route_anchor, route_anchor + route_line)

          path.write_text(content)
          PY
      - name: Commit route change
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add routes/api_v1.php
          git diff --cached --quiet || git commit -m "feat(overtime): register active policy options endpoint"
          git push origin HEAD:feat/overtime-frontend-support
