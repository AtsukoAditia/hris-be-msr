name: Style Quiet

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  style:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none
      - run: composer install --no-interaction --prefer-dist --no-progress --quiet
      - run: vendor/bin/pint --test app routes tests
