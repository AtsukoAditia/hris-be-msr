name: Capture Backend Formatting

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none
      - run: composer install --no-interaction --prefer-dist --no-progress
      - name: Format files
        run: |
          vendor/bin/pint app/Models/OvertimeRequest.php app/Policies/OvertimeRequestPolicy.php app/Services/OvertimeService.php database/migrations/2026_06_19_205742_create_overtime_requests_table.php
          tar -czf backend-format.tar.gz app/Models/OvertimeRequest.php app/Policies/OvertimeRequestPolicy.php app/Services/OvertimeService.php database/migrations/2026_06_19_205742_create_overtime_requests_table.php
      - uses: actions/upload-artifact@v4
        with:
          name: backend-format
          path: backend-format.tar.gz
          retention-days: 1
